<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Queries — AdminForge</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Table & Card Styles to match Dashboard */
    .query-card { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 2px 12px rgba(0,0,0,.05); overflow: hidden; margin-top: 20px; }
    .query-header { background: #f8fafc; border-bottom: 1px solid #e2e8f0; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
    .status-pill { font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; }
    .status-new { background: rgba(146, 26, 2, 0.1); color: #921a02; }
    .status-read { background: #f1f5f9; color: #64748b; }
    .msg-preview { max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #64748b; font-size: 0.8rem; }
    .adm-table th { background: #921a02; color: #fff; padding: 12px; font-size: 0.85rem; }
    .adm-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; font-size: 0.82rem; }
    
    /* Message Modal */
    .msg-body-full { font-size: 0.9rem; color: #334155; line-height: 1.6; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
    
    /* delete button */
    .adm-btn-delete { 
      background: #921a02; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      padding: 4px 8px; 
      font-size: 0.75rem; 
      cursor: pointer;
    }
    .adm-btn-delete:hover { opacity: 0.9; }
  </style>
</head>
<body>

<div class="dash-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">AF</div>
      <div>
        <div class="sidebar-brand-text">AdminForge</div>
        <div class="sidebar-brand-sub">Management System</div>
      </div>
    </div>
    <div class="sidebar-menu">
      <p class="sidebar-section">Main</p>
      <a href="dashboard.html" class="sidebar-item"><span class="si-icon">⬡</span> Dashboard</a>
      <a href="userquery.html" class="sidebar-item active"><span class="si-icon">📬</span> User Queries</a>
      <a href="contactinfo.html" class="sidebar-item"><span class="si-icon">📞</span> Contact Info</a>
    </div>
  </aside>

  <nav class="topbar">
    <div class="topbar-left">
      <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
      <div>
        <div class="topbar-title">Helpdesk</div>
        <div class="topbar-sub">Manage User Messages</div>
      </div>
    </div>
    <div class="topbar-right">
       <button class="btn btn-logout btn-sm" onclick="location.href='index.html'">⏻ Logout</button>
    </div>
  </nav>

  <main class="dash-main">
    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <div class="stat-card">
          <div class="stat-icon blue">📬</div>
          <div><div class="stat-value" id="count-total">0</div><div class="stat-label">Total Queries</div></div>
        </div>
      </div>
    </div>

    <div class="query-card">
      <div class="query-header">
        <h5 class="m-0" style="font-size:1rem; font-weight:700;">Inbound Messages</h5>
        <input type="text" id="querySearch" class="form-control form-control-sm" style="max-width:250px;" placeholder="Search by name or email...">
      </div>
      <div class="table-responsive">
        <table class="adm-table w-100">
          <thead>
            <tr>
              <th>Date</th>
              <th>Full Name</th>
              <th>Subject</th>
              <th>Message Preview</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="queryTableBody">
            <tr><td colspan="6" class="text-center py-4">Loading messages...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="adm-modal-bd" id="modal-view-msg">
  <div class="adm-modal-box">
    <button class="adm-modal-close" onclick="closeMsgModal()">✕</button>
    <h5 id="modal-subject">Message Detail</h5>
    <div class="adm-mgroup">
      <label>From</label>
      <p id="modal-from" class="mb-1 font-weight-bold"></p>
      <p id="modal-email" class="text-muted small"></p>
    </div>
    <div class="adm-mgroup">
      <label>Message</label>
      <div id="modal-body" class="msg-body-full"></div>
    </div>
    <div class="adm-mactions">
      <button class="adm-mcancel" onclick="closeMsgModal()">Close</button>
      <button class="adm-mdel" id="btn-delete-query" onclick="deleteCurrentQuery()">Delete Query</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyArM8sv7J1RUj4XvAJhJd40tzA7Yc8BGXY",
    authDomain: "admin-dashboard-ed62c.firebaseapp.com",
    projectId: "admin-dashboard-ed62c",
    storageBucket: "admin-dashboard-ed62c.firebasestorage.app",
    messagingSenderId: "560027475135",
    appId: "1:560027475135:web:3fae0cb0268729ae79fa0a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const colRef = collection(db, "UserHelpdesk");

  let allQueries = [];
  let currentQueryId = null;

  // Render queries table
  function renderQueries(data) {
    const tbody = document.getElementById('queryTableBody');
    if (!tbody) return;
    
    tbody.innerHTML = data.map(q => {
      const date = q.createdAt?.toDate().toLocaleDateString() || 'N/A';
      return `
        <tr>
          <td>${date}</td>
          <td><strong>${q.fullName || 'Anonymous'}</strong></td>
          <td>${q.subject || 'No Subject'}</td>
          <td><div class="msg-preview">${q.message || ''}</div></td>
          <td><span class="status-pill ${q.status === 'new' ? 'status-new' : 'status-read'}">${q.status}</span></td>
          <td>
            <button class="adm-btn-sm adm-btn-edit" onclick="viewMessage('${q.id}')">View</button>
            <button class="adm-btn-delete ms-2" onclick="confirmDelete('${q.id}')">Delete</button>
          </td>
        </tr>
      `;
    }).join('') || '<tr><td colspan="6" class="text-center">No messages found.</td></tr>';
  }

  // Fetch all queries from Firestore
  async function fetchQueries() {
    try {
      const q = query(colRef, orderBy("createdAt", "desc"));
      const snapshot = await getDocs(q);
      allQueries = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      
      renderQueries(allQueries);
      
      const countEl = document.getElementById('count-total');
      if(countEl) countEl.textContent = allQueries.length;
    } catch (error) {
      console.error("Error fetching queries:", error);
      alert("Failed to load queries. Please refresh the page.");
    }
  }

  // Delete query from Firestore and update UI
  async function deleteQuery(id) {
    try {
      await deleteDoc(doc(db, "UserHelpdesk", id));
      allQueries = allQueries.filter(q => q.id !== id);
      renderQueries(allQueries);
      document.getElementById('count-total').textContent = allQueries.length;
      
      // If modal is open and it's the deleted query, close it
      if (currentQueryId === id) {
        closeMsgModal();
      }
      
      console.log("Query deleted successfully");
    } catch (error) {
      console.error("Error deleting query:", error);
      alert("Failed to delete query. Please try again.");
    }
  }

  // Confirmation dialog for table delete button
  window.confirmDelete = function(id) {
    if(confirm("Are you sure you want to delete this message permanently?")) {
      deleteQuery(id);
    }
  };

  // Delete current query from modal
  window.deleteCurrentQuery = async function() {
    if (!currentQueryId) return;
    
    if(confirm("Delete this message permanently?")) {
      await deleteQuery(currentQueryId);
    }
  };

  // View message in modal
  window.viewMessage = async function(id) {
    const q = allQueries.find(x => x.id === id);
    if(!q) return;

    currentQueryId = id;
    
    document.getElementById('modal-subject').textContent = q.subject || 'No Subject';
    document.getElementById('modal-from').textContent = q.fullName || 'Anonymous';
    document.getElementById('modal-email').textContent = q.email || 'No email';
    document.getElementById('modal-body').textContent = q.message || '';
    document.getElementById('modal-view-msg').classList.add('show');

    // Mark as read if new
    if(q.status === 'new') {
      try {
        await updateDoc(doc(db, "UserHelpdesk", id), { status: "read" });
        fetchQueries(); 
      } catch (error) {
        console.error("Error updating status:", error);
      }
    }
  };

  // Close modal
  window.closeMsgModal = function() {
    document.getElementById('modal-view-msg').classList.remove('show');
    currentQueryId = null;
  };

  // Search functionality
  document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('querySearch');
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        const filtered = allQueries.filter(q => 
          (q.fullName || "").toLowerCase().includes(val) || 
          (q.email || "").toLowerCase().includes(val) || 
          (q.subject || "").toLowerCase().includes(val)
        );
        renderQueries(filtered);
      });
    }

    // Sidebar toggle
    const sidebarToggle = document.getElementById('sidebar-toggle');
    if (sidebarToggle) {
      sidebarToggle.addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
      });
    }
  });

  // Auth check and initialize
  onAuthStateChanged(auth, (user) => {
    if (user && user.email === "issacnewton1503@gmail.com") {
      fetchQueries();
    } else {
      console.warn("Unauthorized access - Redirecting...");
      window.location.href = "index.html"; 
    }
  });
</script>
</body>
</html>
