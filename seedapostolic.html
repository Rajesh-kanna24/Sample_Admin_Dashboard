const SEED_DATA = {
  "institutesForMen":       DOC_MEN,
  "institutesForWomen":     DOC_WOMEN,
  "studyAndRenewalCenters": DOC_STUDY
};

/* ── Main seeding function ─────────────────────────────── */
async function performSeed(forceOverwrite) {
  const user = auth.currentUser;
  if (!user || user.email !== "issacnewton1503@gmail.com") {
    log("❌ Not authorized. Sign in as admin first.", "err");
    return;
  }
  log(`✅ Authenticated as ${user.email}`, "ok");

  for (const [docId, data] of Object.entries(SEED_DATA)) {
    log("", "info");
    log(`📄 Working on: apostolicLife/${docId}`, "info");
    const ref = doc(db, "apostolicLife", docId);
    const snap = await getDoc(ref);

    if (snap.exists() && !forceOverwrite) {
      log(`  ℹ️  ${docId} already exists — skipped. Use Force Overwrite to replace.`, "warn");
      continue;
    }

    try {
      await setDoc(ref, {
        ...data,
        updatedAt: serverTimestamp()
      });
      const count = data.congregations?.length ?? data.centers?.length ?? 1;
      log(`  ✅ ${docId} written — ${count} entries.`, "ok");
    } catch (err) {
      log(`  ❌ Failed to write ${docId}: ${err.message}`, "err");
      console.error(err);
    }
  }

  log("", "info");
  log("🎉 Seeding complete!", "ok");
}

/* ── Button handler ────────────────────────────────────── */
window.startSeed = async function(forceOverwrite) {
  const seedBtn = document.getElementById("seedBtn");
  const overwriteBtn = document.getElementById("overwriteBtn");
  seedBtn.disabled = true;
  overwriteBtn.disabled = true;
  logEl.innerHTML = "";

  // Wait for auth state resolution before proceeding
  await new Promise((resolve) => {
    const unsubscribe = onAuthStateChanged(auth, (user) => {
      unsubscribe();
      resolve();
    });
  });

  await performSeed(forceOverwrite);

  seedBtn.disabled = false;
  overwriteBtn.disabled = false;
};
